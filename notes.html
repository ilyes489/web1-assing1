<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My HTML Notes</title>
</head>
<body>

    <!-- These are some HTML tags I learned in class -->

    <h1>My HTML Notes</h1>

    <dl>
        <dt>h1</dt>
        <dd>This tag is used for a big title.</dd>

        <dt>p</dt>
        <dd>This tag is used for text paragraphs.</dd>

        <dt>ul</dt>
        <dd>This tag creates a list with bullet points.</dd>
    </dl>

    <!-- This link takes me back to the home page -->

    <a href="index.html">Back to Home</a>
